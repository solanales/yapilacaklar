    const { useState, useEffect, useRef } = React;

  { value: "aylik", label: "Aylık" },
];
const WEEKDAYS = ["Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi","Pazar"];

const priorityLabel = { yuksek:"Yüksek", orta:"Orta", dusuk:"Düşük" };

  devamediyor: { label:"Devam Ediyor", color:"#f59e0b", bg:"rgba(245,158,11,0.12)" },
  tamamlandi: { label:"Tamamlandı", color:"#22c55e", bg:"rgba(34,197,94,0.12)" },

// ── Yardımcı fonksiyonlar ──────────────────────────────────────────
function normalizeDays(days) {
  if (!days) return [];
  return Array.isArray(days) ? days : [days];
}

function localDateStr(d) {
  const date = d || new Date();
  return date.getFullYear() + "-" + String(date.getMonth()+1).padStart(2,"0") + "-" + String(date.getDate()).padStart(2,"0");
}

function datePrefix(d) {
  const date = d ? new Date(d+"T00:00:00") : new Date();
  return String(date.getFullYear()).slice(2) + String(date.getMonth()+1).padStart(2,"0") + String(date.getDate()).padStart(2,"0");
}

function addDays(ds, n) {
  const d = new Date(ds+"T00:00:00");
  d.setDate(d.getDate()+n);
  return localDateStr(d);
}

function updateTitlePrefix(title, newPrefix) {
  return /^\d{6} /.test(title) ? newPrefix+" "+title.slice(7) : title;
}

function resetTask(task, today) {
  const prefix = datePrefix(today);
  return {
    ...task,
    status: "bekliyor",
    startedAt: null,
    subtasks: task.subtasks.map(s=>({...s,done:false})),
    lastResetDate: today,
    overdue: false,
    postponedUntil: null,
    title: updateTitlePrefix(task.title, prefix),
  };
}

// Bir görevin belirli bir tarihte planlanmış olup olmadığı (takvim için)
function taskMatchesDate(t, ds) {
  if (t.postponedUntil && t.postponedUntil > ds) return false;

  const todayStr = localDateStr();

  // Gecikmiş görev: bugün ve geçmişte göster
  if (t.overdue && ds <= todayStr) return true;

  if (t.recurrence === "gunluk") return true;

  if (t.recurrence === "haftalik") {
    const days = normalizeDays(t.recurrenceDays);
    const d = new Date(ds+"T00:00:00");
    const wd = d.getDay();
    return days.includes(WEEKDAYS[wd===0?6:wd-1]);
  }

  if (t.recurrence === "aylik") {
    const days = normalizeDays(t.recurrenceDays);
    return days.includes(new Date(ds+"T00:00:00").getDate());
  }

  // tek-seferlik
  const tomStr = addDays(todayStr, 1);
  if (t.time==="bugun") return ds===todayStr;
  if (t.time==="yarin") return ds===tomStr;
  return t.time===ds;
}

// Görevin verilen tarihten sonraki ilk planlanmış gününü bul
function getNextScheduledDate(task, fromDate) {
  if (task.recurrence==="gunluk") return addDays(fromDate,1);

  if (task.recurrence==="haftalik") {
    const days = normalizeDays(task.recurrenceDays);
    if (!days.length) return null;
    for (let i=1;i<=7;i++) {
      const ds = addDays(fromDate,i);
      const d = new Date(ds+"T00:00:00");
      const wd = d.getDay();
      if (days.includes(WEEKDAYS[wd===0?6:wd-1])) return ds;
    }
    return null;
  }

  if (task.recurrence==="aylik") {
    const days = normalizeDays(task.recurrenceDays).map(Number).sort((a,b)=>a-b);
    if (!days.length) return null;
    const from = new Date(fromDate+"T00:00:00");
    const fromDay = from.getDate();
    const fromMonth = from.getMonth();
    const fromYear = from.getFullYear();
    for (const day of days) {
      if (day > fromDay) {
        const maxDay = new Date(fromYear,fromMonth+1,0).getDate();
        if (day<=maxDay) return fromYear+"-"+String(fromMonth+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
      }
    }
    const nm = fromMonth===11?0:fromMonth+1;
    const ny = fromMonth===11?fromYear+1:fromYear;
    const nmMax = new Date(ny,nm+1,0).getDate();
    for (const day of days) {
      if (day<=nmMax) return ny+"-"+String(nm+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    }
    return null;
  }

  return null;
}

// fromDate dahil ilk planlanmış günü bul
function getFirstScheduledDateOnOrAfter(task, fromDate) {
  if (task.recurrence==="gunluk") return fromDate;
  if (task.recurrence==="haftalik") {
    const days=normalizeDays(task.recurrenceDays);
    if(!days.length)return null;
    for(let i=0;i<=7;i++){
      const ds=addDays(fromDate,i);
      const d=new Date(ds+"T00:00:00");
      const wd=d.getDay();
      if(days.includes(WEEKDAYS[wd===0?6:wd-1]))return ds;
    }
    return null;
  }
  if (task.recurrence==="aylik") {
    const days=normalizeDays(task.recurrenceDays).map(Number).sort((a,b)=>a-b);
    if(!days.length)return null;
    const from=new Date(fromDate+"T00:00:00");
    const fromDay=from.getDate(),fromMonth=from.getMonth(),fromYear=from.getFullYear();
    for(const day of days){
      if(day>=fromDay){
        const maxDay=new Date(fromYear,fromMonth+1,0).getDate();
        if(day<=maxDay)return fromYear+"-"+String(fromMonth+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
      }
    }
    const nm=fromMonth===11?0:fromMonth+1,ny=fromMonth===11?fromYear+1:fromYear;
    const nmMax=new Date(ny,nm+1,0).getDate();
    for(const day of days){if(day<=nmMax)return ny+"-"+String(nm+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");}
    return null;
  }
  return null;
}

// Gün değişiminde görev işleme
function processTaskOnDayChange(t, today) {
  const todayDate = new Date(today+"T00:00:00");
  const todayWD = WEEKDAYS[todayDate.getDay()===0?6:todayDate.getDay()-1];

  // Format migration
  let task = {
    ...t,
    recurrenceDays: t.recurrenceDays !== undefined ? t.recurrenceDays : (t.recurrenceDay ? [t.recurrenceDay] : []),
    overdue: t.overdue || false,
    postponedUntil: t.postponedUntil || null,
  };

  if (!task.lastResetDate) return { ...task, lastResetDate: today };
  if (task.postponedUntil && task.postponedUntil <= today) task = { ...task, postponedUntil: null };
  if (task.lastResetDate >= today) return task;

  const scheduledDays = normalizeDays(task.recurrenceDays);

  if (task.recurrence === "gunluk") return resetTask(task, today);

  if (task.recurrence === "haftalik") {
    if (scheduledDays.includes(todayWD)) return resetTask(task, today);
    if (task.status !== "tamamlandi" && !task.postponedUntil) {
      const lastDate = new Date(task.lastResetDate+"T00:00:00");
      const lastWD = WEEKDAYS[lastDate.getDay()===0?6:lastDate.getDay()-1];
      if (task.overdue || scheduledDays.includes(lastWD)) {
        return { ...task, overdue: true, lastResetDate: today };
      }
    }
    return { ...task, lastResetDate: today };
  }

  if (task.recurrence === "aylik") {
    if (scheduledDays.map(Number).includes(todayDate.getDate())) return resetTask(task, today);
    if (task.status !== "tamamlandi" && !task.postponedUntil) {
      const lastDate = new Date(task.lastResetDate+"T00:00:00");
      if (task.overdue || scheduledDays.map(Number).includes(lastDate.getDate())) {
        return { ...task, overdue: true, lastResetDate: today };
      }
    }
    return { ...task, lastResetDate: today };
  }

  // tek-seferlik
  if (task.status !== "tamamlandi" && !task.postponedUntil) {
    return { ...task, overdue: true, lastResetDate: today };
  }
  return { ...task, lastResetDate: today };
}

function formatElapsed(isoString) {
  if (!isoString) return null;
  const diff = Math.floor((Date.now()-new Date(isoString))/1000);
  if (diff<60) return diff+"s";
  if (diff<3600) return Math.floor(diff/60)+"dk";
  if (diff<86400) return Math.floor(diff/3600)+"sa";
  return Math.floor(diff/86400)+"g";
}

// ── Sound ──────────────────────────────────────────────────────────
function useSound() {
  const ctx = useRef(null);
  const getCtx = () => { if (!ctx.current) ctx.current = new (window.AudioContext||window.webkitAudioContext)(); return ctx.current; };
  const play = (freq,type,duration,vol=0.3,delay=0) => {
    try {
      const c=getCtx(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type; o.frequency.setValueAtTime(freq,c.currentTime+delay);
      g.gain.setValueAtTime(vol,c.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+duration);
      o.start(c.currentTime+delay); o.stop(c.currentTime+delay+duration);
    } catch(_) {}
  };
  return {
    complete: ()=>{ play(523,"sine",0.15,0.3); play(783,"sine",0.2,0.3,0.15); },
    progress: ()=>{ play(440,"sine",0.15,0.2); },
    reset: ()=>{ play(392,"sine",0.12,0.15); },
    subtask: ()=>{ play(600,"square",0.08,0.15); },
    add: ()=>{ play(350,"sine",0.1,0.2); play(520,"sine",0.12,0.15,0.1); },
    close: ()=>{ play(400,"sine",0.12,0.2); play(280,"sine",0.1,0.15,0.12); },
    restore: ()=>{ play(440,"sine",0.1,0.15); play(560,"sine",0.12,0.12,0.1); },
    otele: ()=>{ play(330,"sine",0.1,0.15); play(440,"sine",0.08,0.12,0.12); },
  };
}

function RecurrenceEditor({ task, onChange, onClose }) {
  const [localDays, setLocalDays] = useState(normalizeDays(task.recurrenceDays));
  const [localRec, setLocalRec] = useState(task.recurrence||"tek-seferlik");

  const toggleDay = (day) => {
    const newDays = localDays.includes(day) ? localDays.filter(d=>d!==day) : [...localDays, day];
    setLocalDays(newDays);
    onChange({ recurrenceDays: newDays });
  };
  const changeRec = (val) => {
    setLocalRec(val);
    setLocalDays([]);
    const needsDays = val==="haftalik"||val==="aylik";
    onChange({recurrence:val, recurrenceDays:[]});
    if(!needsDays) onClose();
  };
  return (
    <div style={{ marginTop:"0.6rem",background:"var(--card-color)",border:"1px solid #1e293b",borderRadius:8,padding:"0.7rem 0.9rem",display:"flex",flexDirection:"column",gap:"0.5rem" }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div style={{ fontSize:"0.72rem",color:"#64748b",letterSpacing:"0.1em",textTransform:"uppercase" }}>Tekrarlama</div>
        <button onClick={onClose} style={{ background:"transparent",border:"none",color:"#475569",cursor:"pointer",fontSize:"0.75rem",padding:"0 4px" }}>✕ Kapat</button>
      </div>
      <div style={{ display:"flex",gap:"0.4rem",flexWrap:"wrap" }}>
        {RECURRENCE_OPTIONS.map(opt=>(
          <button key={opt.value} onClick={()=>changeRec(opt.value)} style={{ fontSize:"0.72rem",padding:"3px 10px",borderRadius:99,cursor:"pointer",border:"none",background:localRec===opt.value?recurrenceColor[opt.value]:"#1e293b",color:localRec===opt.value?"#0d0d14":"#94a3b8",fontWeight:localRec===opt.value?"bold":"normal" }}>
            {opt.label}
          </button>
        ))}
      </div>
      {localRec==="haftalik"&&(
        <div style={{ display:"flex",gap:"0.3rem",flexWrap:"wrap" }}>
          {WEEKDAYS.map(day=>(
            <button key={day} onClick={()=>toggleDay(day)} style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,cursor:"pointer",border:"none",background:localDays.includes(day)?"#34d399":"#1e293b",color:localDays.includes(day)?"#0d0d14":"#94a3b8",fontWeight:localDays.includes(day)?"bold":"normal" }}>{day}</button>
          ))}
        </div>
      )}
      {localRec==="aylik"&&(
        <div style={{ display:"flex",gap:"0.3rem",flexWrap:"wrap" }}>
          {Array.from({length:31},(_,i)=>i+1).map(day=>(
            <button key={day} onClick={()=>toggleDay(day)} style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,cursor:"pointer",border:"none",background:localDays.includes(day)?"#f472b6":"#1e293b",color:localDays.includes(day)?"#0d0d14":"#94a3b8",fontWeight:localDays.includes(day)?"bold":"normal",minWidth:28,textAlign:"center" }}>{day}</button>
          ))}
        </div>
      )}
      {(localRec==="haftalik"||localRec==="aylik")&&localDays.length>0&&(
        <div style={{ fontSize:"0.65rem",color:"#64748b" }}>{"Seçili: "+localDays.join(", ")}</div>
      )}
    </div>
  );
}

// Takvimde o güne özel tarih prefix'i ile başlık göster
function titleForDate(task, ds) {
  const raw = /^\d{6} /.test(task.title) ? task.title.slice(7) : task.title;
  return datePrefix(ds) + " " + raw;
}

function CalendarDayDetail({ date, tasks, onClose, onCloseTask }) {
  const ds = localDateStr(date);
  const dotColor = { bekliyor:"#94a3b8",devamediyor:"#f59e0b",tamamlandi:"#22c55e" };
  const dayTasks = tasks.filter(t=>taskMatchesDate(t,ds));
  return (

      </div>
      {dayTasks.length===0?(
        <div style={{ fontSize:"0.78rem",color:"#475569",textAlign:"center",padding:"0.75rem 0" }}>Bu gün için görev yok</div>
      ):(
        <div style={{ display:"flex",flexDirection:"column",gap:"0.45rem" }}>
          {dayTasks.map(t=>(

function MonthlyCalendar({ tasks, onCloseTask }) {
  const [base,setBase] = useState(new Date());
  const [selectedDay,setSelectedDay] = useState(null);
  const todayStr = localDateStr();
  const getMonthDays = (d) => {
    const year=d.getFullYear(),month=d.getMonth();
    const first=new Date(year,month,1),last=new Date(year,month+1,0);
    const startDow=first.getDay()===0?6:first.getDay()-1;
    const days=[];
    for(let i=0;i<startDow;i++){const dd=new Date(first);dd.setDate(dd.getDate()-(startDow-i));days.push({date:dd,inMonth:false});}
    for(let i=1;i<=last.getDate();i++)days.push({date:new Date(year,month,i),inMonth:true});
    while(days.length<42){const prev=days[days.length-1].date;const dd=new Date(prev);dd.setDate(prev.getDate()+1);days.push({date:dd,inMonth:false});}
    return days;
  };
  const days = getMonthDays(base);
  return (
    <div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem" }}>
        <button onClick={()=>{const d=new Date(base);d.setMonth(d.getMonth()-1);setBase(d);setSelectedDay(null);}} style={{ background:"#1e293b",border:"none",borderRadius:8,padding:"6px 14px",color:"#94a3b8",cursor:"pointer" }}>{"<"}</button>
        <span style={{ fontSize:"0.82rem",color:"#64748b",textTransform:"capitalize" }}>{base.toLocaleDateString("tr-TR",{month:"long",year:"numeric"})}</span>
        <button onClick={()=>{const d=new Date(base);d.setMonth(d.getMonth()+1);setBase(d);setSelectedDay(null);}} style={{ background:"#1e293b",border:"none",borderRadius:8,padding:"6px 14px",color:"#94a3b8",cursor:"pointer" }}>{">"}</button>
      </div>
      <div style={{ overflowX:"auto" }}>
        <div style={{ minWidth:360 }}>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"0.2rem",marginBottom:"0.2rem" }}>
            {["Pt","Sa","Ça","Pe","Cu","Ct","Pz"].map(d=><div key={d} style={{ textAlign:"center",fontSize:"0.65rem",color:"#475569",padding:"0.2rem 0" }}>{d}</div>)}
          </div>
          <CalendarGrid days={days} tasks={tasks} todayStr={todayStr} selectedDay={selectedDay} onSelect={setSelectedDay} minHeight={46}/>
        </div>
      </div>
      {selectedDay&&<CalendarDayDetail date={selectedDay.date} tasks={tasks} onClose={()=>setSelectedDay(null)} onCloseTask={onCloseTask}/>}
    </div>
  );
}

function Yapilacaklar() {
  const sound = useSound();
  const [tasks,setTasks] = useState([]);
  const [closedTasks,setClosedTasks] = useState([]);
  const [customCategories,setCustomCategories] = useState([]);
  const [view,setView] = useState("liste");
  const [editingNote,setEditingNote] = useState(null);
  const [editingDetail,setEditingDetail] = useState(null);
  const [detailInput,setDetailInput] = useState("");
  const [noteInput,setNoteInput] = useState("");
  const [expanded,setExpanded] = useState({});
  const [newSubtask,setNewSubtask] = useState({});
  const [addingSubtask,setAddingSubtask] = useState(null);
  const [editingRecurrence,setEditingRecurrence] = useState(null);
  const [editingTime,setEditingTime] = useState(null);
  const [editingCategory,setEditingCategory] = useState(null);
  const [addingTask,setAddingTask] = useState(false);
  const [editingTitle,setEditingTitle] = useState(null);
  const [titleInput,setTitleInput] = useState("");
  const [newTask,setNewTask] = useState({title:"",detail:"",category:"Kişisel",emoji:"📌",priority:"orta",time:"bugun"});
  const [loaded,setLoaded] = useState(false);
  const [soundOn,setSoundOn] = useState(()=>{ try{return localStorage.getItem("sound-enabled")!=="false";}catch(_){return true;} });
  const [bgColor,setBgColor] = useState(()=>{ try{return localStorage.getItem("bg-color")||"#0d0d14";}catch(_){return "#0d0d14";} });
  const [cardColor,setCardColor] = useState(()=>{ try{return localStorage.getItem("card-color")||"#13131f";}catch(_){return "#13131f";} });
  const [showColorPanel,setShowColorPanel] = useState(false);
  const [syncCode,setSyncCode] = useState(()=>{ try{return localStorage.getItem("sync-code")||"";}catch(_){return "";} });
  const [syncInput,setSyncInput] = useState("");
  const [showSyncPanel,setShowSyncPanel] = useState(false);
  const [syncStatus,setSyncStatus] = useState("idle"); // idle | syncing | synced | error
  const fbListenerRef = useRef(null);

  const s = {
    complete:()=>soundOn&&sound.complete(), progress:()=>soundOn&&sound.progress(),
    reset:()=>soundOn&&sound.reset(), subtask:()=>soundOn&&sound.subtask(),
    add:()=>soundOn&&sound.add(), close:()=>soundOn&&sound.close(),
    restore:()=>soundOn&&sound.restore(), otele:()=>soundOn&&sound.otele(),
  };
  useEffect(()=>{ try{localStorage.setItem("sound-enabled",soundOn);}catch(_){} },[soundOn]);
  useEffect(()=>{ try{localStorage.setItem("bg-color",bgColor);document.body.style.background=bgColor;}catch(_){} },[bgColor]);
  useEffect(()=>{ try{localStorage.setItem("card-color",cardColor);document.documentElement.style.setProperty("--card-color",cardColor);}catch(_){} },[cardColor]);

  useEffect(()=>{
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const stored = JSON.parse(raw);
        const storedTasks = Array.isArray(stored)?stored:(stored.tasks||[]);
        const storedCats = Array.isArray(stored)?[]:(stored.customCategories||[]);
        const storedClosed = Array.isArray(stored)?[]:(stored.closedTasks||[]);
        const today = localDateStr();
        const processed = storedTasks.map(t=>processTaskOnDayChange(t,today));
        if (processed.length>0) setTasks(processed);
        if (storedCats.length>0) setCustomCategories(storedCats);
        if (storedClosed.length>0) setClosedTasks(storedClosed);
      }
    } catch(_) {}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if (!loaded) return;
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify({tasks,customCategories,closedTasks}));}catch(_){}
  },[tasks,customCategories,closedTasks,loaded]);

  const fbLoadedRef = useRef(false);
  const writeTimerRef = useRef(null);
  const lastWriteTimeRef = useRef(0);

  const [fbFirstLoaded, setFbFirstLoaded] = useState(false);

  const attachFirebaseListener = (code) => {
    if (!code||!window._fbdb) return;
    if (fbListenerRef.current) fbListenerRef.current();
    fbLoadedRef.current = false;
    lastWriteTimeRef.current = 0;
    setSyncStatus("syncing");
    const ref = window._fbdb.ref("data/"+code);
    const handler = ref.on("value", snap=>{
      const val = snap.val();
      if (val && Array.isArray(val.tasks)) {
        const incomingTime = val._ts || 0;
        if(incomingTime > lastWriteTimeRef.current){
          const today = localDateStr();
          try {
            const t = (val.tasks||[]).map(t=>processTaskOnDayChange({
              subtasks:[],recurrenceDays:[],overdue:false,postponedUntil:null,note:"",...t
            },today));
            setTasks(t);
            setCustomCategories(val.customCategories||[]);
            setClosedTasks(val.closedTasks||[]);
            if(val.bgColor) setBgColor(val.bgColor);
            if(val.cardColor) setCardColor(val.cardColor);
          } catch(_) { setSyncStatus("error"); return; }
        }
        setSyncStatus("synced");
      } else {
        setSyncStatus("synced");
      }
      if(!fbLoadedRef.current){
        fbLoadedRef.current = true;
        setFbFirstLoaded(f=>!f); // write effect'i tetikle
      }
    }, ()=>setSyncStatus("error"));
    fbListenerRef.current = ()=>ref.off("value",handler);
  };

  useEffect(()=>{
    if(!loaded||!syncCode)return;
    attachFirebaseListener(syncCode);
    return ()=>{ if(fbListenerRef.current)fbListenerRef.current(); };
  },[loaded,syncCode]);

  // Firebase'e yaz — debounce 500ms, ilk FB okuması tamamlanana kadar beklenir
  useEffect(()=>{
    if(!loaded||!syncCode||!window._fbdb)return;
    if(writeTimerRef.current) clearTimeout(writeTimerRef.current);
    writeTimerRef.current = setTimeout(()=>{
      // İlk Firebase okuması henüz tamamlanmadıysa yazma
      if(!fbLoadedRef.current) return;
      const ts = Date.now();
      lastWriteTimeRef.current = ts + 3000;
      setSyncStatus("syncing");
      window._fbdb.ref("data/"+syncCode).set({tasks,customCategories,closedTasks,bgColor,cardColor,_ts:ts})
        .then(()=>setSyncStatus("synced"))
        .catch(()=>{ setSyncStatus("error"); lastWriteTimeRef.current=0; });
    },500);
    return ()=>{ if(writeTimerRef.current) clearTimeout(writeTimerRef.current); };
  },[tasks,customCategories,closedTasks,bgColor,cardColor,loaded,syncCode,fbFirstLoaded]);

  const connectSync = (code) => {
    const trimmed = code.trim().toLowerCase().replace(/[^a-z0-9]/g,"");
    if(!trimmed)return;
    try{localStorage.setItem("sync-code",trimmed);}catch(_){}
    setSyncCode(trimmed);
    setShowSyncPanel(false);
    setSyncStatus("syncing");
  };

  const generateCode = () => {
    const chars="abcdefghijklmnopqrstuvwxyz0123456789";
    return Array.from({length:6},()=>chars[Math.floor(Math.random()*chars.length)]).join("");
  };

  const disconnectSync = () => {
    if(fbListenerRef.current)fbListenerRef.current();
    try{localStorage.removeItem("sync-code");}catch(_){}
    setSyncCode("");
    setSyncStatus("idle");
  };

  // Gün değişimini runtime'da tespit et (Seçenek B)
  useEffect(()=>{
    if (!loaded) return;
    const interval = setInterval(()=>{
      const today = localDateStr();
      setTasks(prev=>{
        const processed=prev.map(t=>processTaskOnDayChange(t,today));
        const changed=processed.some((t,i)=>t.status!==prev[i].status||t.overdue!==prev[i].overdue||t.lastResetDate!==prev[i].lastResetDate||t.title!==prev[i].title);
        return changed?processed:prev;
      });
    }, 30000);
    return ()=>clearInterval(interval);
  },[loaded]);

  const allCategories = [...new Set([...DEFAULT_CATEGORIES,...customCategories,...tasks.map(t=>t.category)])];

  const cycleStatus = (id) => {
    setTasks(prev=>prev.map(t=>{
      if(t.id!==id)return t;
      const order=["bekliyor","devamediyor","tamamlandi"];
      const next=order[(order.indexOf(t.status)+1)%order.length];
      if(next==="tamamlandi"){s.complete();return{...t,status:next,overdue:false,postponedUntil:null};}
      if(next==="devamediyor"){s.progress();return{...t,status:next,startedAt:!t.startedAt?new Date().toISOString():t.startedAt};}
      s.reset();return{...t,status:next,startedAt:null};
    }));
  };

  const toggleSubtask = (taskId,subId) => {
    setTasks(prev=>prev.map(t=>{
      if(t.id!==taskId)return t;
      const subtasks=t.subtasks.map(s=>s.id===subId?{...s,done:!s.done}:s);
      const allDone=subtasks.length>0&&subtasks.every(s=>s.done);
      const anyDone=subtasks.some(s=>s.done);
      let ns=t.status;
      if(allDone){ns="tamamlandi";s.complete();}
      else if(anyDone){ns="devamediyor";s.subtask();}
      else{ns="bekliyor";s.reset();}
      const sa=ns==="devamediyor"&&!t.startedAt?new Date().toISOString():ns==="bekliyor"?null:t.startedAt;
      return{...t,subtasks,status:ns,startedAt:sa,overdue:ns==="tamamlandi"?false:t.overdue};
    }));
  };

  const handleOtele = (task) => {
    s.otele();
    const today = localDateStr();
    const tomorrow = addDays(today,1);
    if (task.recurrence==="gunluk") { closeTask(task.id); return; }
    if (task.recurrence==="tek-seferlik") {
      updateTask(task.id,{postponedUntil:tomorrow,overdue:false,time:tomorrow,title:updateTitlePrefix(task.title,datePrefix(tomorrow))});
      return;
    }
    if (task.recurrence==="haftalik"||task.recurrence==="aylik") {
      const next=getNextScheduledDate(task,today);
      if(!next||next===tomorrow) { closeTask(task.id); }
      else { updateTask(task.id,{postponedUntil:tomorrow,overdue:false,title:updateTitlePrefix(task.title,datePrefix(tomorrow))}); }
    }
  };

  const addSubtask = (taskId) => {
    const label=(newSubtask[taskId]||"").trim();
    if(!label)return;
    setTasks(prev=>prev.map(t=>t.id!==taskId?t:{...t,subtasks:[...t.subtasks,{id:taskId+"-"+Date.now(),label:datePrefix()+" "+label,done:false}]}));
    setNewSubtask(n=>({...n,[taskId]:""}));
    setAddingSubtask(null);
  };

  const removeSubtask = (taskId,subId) => setTasks(prev=>prev.map(t=>t.id!==taskId?t:{...t,subtasks:t.subtasks.filter(s=>s.id!==subId)}));

  const closeTask = (id) => {
    s.close();
    const task=tasks.find(t=>t.id===id);
    if(!task)return;
    setClosedTasks(prev=>[{...task,closedAt:new Date().toISOString()},...prev]);
    setTasks(prev=>prev.filter(t=>t.id!==id));
  };

  const restoreTask = (id) => {
    s.restore();
    const task=closedTasks.find(t=>t.id===id);
    if(!task)return;
    const{closedAt,...restored}=task;
    setTasks(prev=>[restored,...prev]);
    setClosedTasks(prev=>prev.filter(t=>t.id!==id));
  };

  const deleteClosedTask = (id) => setClosedTasks(prev=>prev.filter(t=>t.id!==id));
  const saveNote = (id) => { setTasks(prev=>prev.map(t=>t.id===id?{...t,note:noteInput}:t)); setEditingNote(null); };
  const updateTask = (taskId,changes) => setTasks(prev=>prev.map(t=>t.id!==taskId?t:{...t,...changes}));

  const addTask = () => {
    const title=newTask.title.trim();
    if(!title)return;
    s.add();
    const today=localDateStr();
    const id=Date.now();
    // Tarih etiketini zaman değerine göre belirle
    let initialPrefix;
    if(newTask.time==="bugun") initialPrefix=datePrefix(today);
    else if(newTask.time==="yarin") initialPrefix=datePrefix(addDays(today,1));
    else if(newTask.time&&newTask.time.match(/^\d{4}/)) initialPrefix=datePrefix(newTask.time);
    else initialPrefix=datePrefix(today);
    setTasks(prev=>[...prev,{id,category:newTask.category,emoji:newTask.emoji,title:initialPrefix+" "+title,detail:newTask.detail,priority:newTask.priority,time:newTask.time,status:"bekliyor",note:"",recurrence:"tek-seferlik",recurrenceDays:[],subtasks:[],startedAt:null,lastResetDate:today,overdue:false,postponedUntil:null}]);
    setNewTask({title:"",detail:"",category:"Kişisel",emoji:"📌",priority:"orta",time:"bugun"});
    setAddingTask(false);
  };

  const saveTitle = (id) => { setTasks(prev=>prev.map(t=>t.id===id?{...t,title:titleInput.trim()||t.title}:t)); setEditingTitle(null); };

  // Tekrarlama değişince tek task güncelle, ilk planlı tarihin prefix'ini ata
  const handleRecurrenceChange = (taskId, changes) => {
    const today = localDateStr();
    setTasks(prev=>prev.map(t=>{
      if(t.id!==taskId)return t;
      const updated={...t,...changes};
      const days=normalizeDays(updated.recurrenceDays);
      const rawTitle=/^\d{6} /.test(updated.title)?updated.title.slice(7):updated.title;
      if(updated.recurrence==="haftalik"&&days.length>0){
        const first=getFirstScheduledDateOnOrAfter(updated,today);
        if(first)updated.title=datePrefix(first)+" "+rawTitle;
      } else if(updated.recurrence==="aylik"&&days.length>0){
        const first=getFirstScheduledDateOnOrAfter(updated,today);
        if(first)updated.title=datePrefix(first)+" "+rawTitle;
      } else if(updated.recurrence==="gunluk"){
        updated.title=datePrefix(today)+" "+rawTitle;
      }
      return updated;
    }));
  };

  const formatTimeLabel = (val) => {
    if(!val||val==="bugun")return"Bugün";
    if(val==="yarin")return"Yarın";
    if(val&&val.match(/^\d{4}/))return new Date(val).toLocaleDateString("tr-TR",{day:"numeric",month:"short"});
    return val;
  };

  const formatRecurrenceLabel = (task) => {
    const base=(RECURRENCE_OPTIONS.find(o=>o.value===task.recurrence)||{}).label||"Tek Seferlik";
    const days=normalizeDays(task.recurrenceDays);
    if(!days.length)return base;
    if(task.recurrence==="haftalik")return base+" · "+days.map(d=>d.slice(0,3)).join(", ");
    if(task.recurrence==="aylik")return base+" · "+days.join(", ");
    return base;
  };

  const completed=tasks.filter(t=>t.status==="tamamlandi").length;
  const inProgress=tasks.filter(t=>t.status==="devamediyor").length;
  const progress=tasks.length>0?Math.round((completed/tasks.length)*100):0;
  const categories=[...new Set(tasks.map(t=>t.category))];

  // Bu haftanın Pazartesi-Pazar aralığı
  const getWeekRange = () => {
    const today = new Date();
    const dow = today.getDay();
    const diff = dow===0?-6:1-dow;
    const mon = new Date(today); mon.setDate(today.getDate()+diff); mon.setHours(0,0,0,0);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return { start: localDateStr(mon), end: localDateStr(sun) };
  };
  const weekRange = getWeekRange();

  const taskInThisWeek = (t) => {
    if (t.overdue) return true; // gecikmiş görevler her zaman göster
    if (t.recurrence==="gunluk") return true;
    if (t.recurrence==="haftalik") {
      const days=normalizeDays(t.recurrenceDays);
      for(let i=0;i<=6;i++){
        const ds=addDays(weekRange.start,i);
        if(ds>weekRange.end)break;
        const d=new Date(ds+"T00:00:00"),wd=d.getDay();
        if(days.includes(WEEKDAYS[wd===0?6:wd-1]))return true;
      }
      return false;
    }
    if (t.recurrence==="aylik") {
      const days=normalizeDays(t.recurrenceDays).map(Number);
      for(let i=0;i<=6;i++){
        const ds=addDays(weekRange.start,i);
        if(ds>weekRange.end)break;
        if(days.includes(new Date(ds+"T00:00:00").getDate()))return true;
      }
      return false;
    }
    // tek-seferlik
    const today=localDateStr();
    const tom=addDays(today,1);
    let taskDate;
    if(t.time==="bugun")taskDate=today;
    else if(t.time==="yarin")taskDate=tom;
    else taskDate=t.time;
    if(!taskDate)return false;
    return taskDate>=weekRange.start && taskDate<=weekRange.end;
  };
  const weekTasks = tasks.filter(taskInThisWeek);
  const weekCategories = [...new Set(weekTasks.map(t=>t.category))];

  return (
    <div style={{ minHeight:"100vh",background:bgColor,fontFamily:"Georgia, serif",padding:"2rem 1rem",color:"#e2e8f0" }}>
      <div style={{ maxWidth:660,margin:"0 auto" }}>
        {/* Header */}
        <div style={{ marginBottom:"2rem" }}>
          <div style={{ fontSize:"0.72rem",letterSpacing:"0.2em",color:"#64748b",textTransform:"uppercase",marginBottom:"0.3rem" }}>{new Date().toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long"})}</div>
          <div style={{ display:"flex",alignItems:"center",gap:"0.75rem" }}>
            <h1 style={{ fontSize:"2rem",fontWeight:"normal",margin:0,color:"#f1f5f9",letterSpacing:"-0.02em" }}>Görevler</h1>
            <button onClick={()=>setSoundOn(o=>!o)} style={{ background:"transparent",border:"none",cursor:"pointer",fontSize:"1.1rem",opacity:soundOn?1:0.35,padding:0 }}>
              {soundOn?"🔊":"🔇"}
            </button>
            <button onClick={()=>{setShowColorPanel(o=>!o);setShowSyncPanel(false);}} title="Arka plan rengi" style={{ width:22,height:22,borderRadius:"50%",background:bgColor,border:"2px solid #334155",cursor:"pointer",padding:0,flexShrink:0 }}/>
            <button onClick={()=>{setShowSyncPanel(o=>!o);setShowColorPanel(false);}} title="Senkronizasyon" style={{ background:"transparent",border:"none",cursor:"pointer",fontSize:"1.1rem",padding:0,opacity:syncCode?1:0.4 }}>
              {syncStatus==="syncing"?"⏳":syncStatus==="synced"?"☁️":syncStatus==="error"?"⚠️":"☁️"}
            </button>
          </div>
          {showColorPanel&&(
            <div style={{ marginTop:"0.75rem",background:"var(--card-color)",border:"1px solid #334155",borderRadius:12,padding:"1rem" }}>
              <div style={{ fontSize:"0.72rem",color:"#64748b",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"0.75rem" }}>Arka Plan Rengi</div>
              <div style={{ display:"flex",gap:"0.5rem",flexWrap:"wrap",marginBottom:"0.5rem" }}>
                {["#0d0d14","#0f172a","#1a1a2e","#0f0e17","#1b1b2f","#16213e","#1a1a1a","#0d1117","#1e1b2e","#0a0a0f","#12111a","#060a10","#1f1235","#0e1628","#14181c"].map(c=>(
                  <button key={c} onClick={()=>setBgColor(c)} style={{ width:28,height:28,borderRadius:6,background:c,border:bgColor===c?"2px solid #818cf8":"2px solid #334155",cursor:"pointer",padding:0 }}/>
                ))}
              </div>
              <div style={{ display:"flex",gap:"0.5rem",alignItems:"center",marginBottom:"1rem" }}>
                <span style={{ fontSize:"0.72rem",color:"#64748b" }}>Özel:</span>
                <input type="color" value={bgColor} onChange={e=>setBgColor(e.target.value)} style={{ width:36,height:28,border:"none",borderRadius:6,cursor:"pointer",background:"transparent" }}/>
                <span style={{ fontSize:"0.72rem",color:"#475569",fontFamily:"monospace" }}>{bgColor}</span>
                <button onClick={()=>setBgColor("#0d0d14")} style={{ marginLeft:"auto",fontSize:"0.68rem",padding:"3px 8px",borderRadius:6,background:"#1e293b",border:"none",color:"#64748b",cursor:"pointer" }}>Sıfırla</button>
              </div>
              <div style={{ fontSize:"0.72rem",color:"#64748b",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"0.75rem" }}>Görev Kutusu Rengi</div>
              <div style={{ display:"flex",gap:"0.5rem",flexWrap:"wrap",marginBottom:"0.5rem" }}>
                {["#13131f","#1e293b","#0f172a","#1a1a2e","#16213e","#1e1b2e","#0d1117","#1f1235","#12111a","#1a1525","#0e1628","#161b22","#1c1c2e","#0f0f1a","#1a1a1a"].map(c=>(
                  <button key={c} onClick={()=>setCardColor(c)} style={{ width:28,height:28,borderRadius:6,background:c,border:cardColor===c?"2px solid #818cf8":"2px solid #334155",cursor:"pointer",padding:0 }}/>
                ))}
              </div>
              <div style={{ display:"flex",gap:"0.5rem",alignItems:"center" }}>
                <span style={{ fontSize:"0.72rem",color:"#64748b" }}>Özel:</span>
                <input type="color" value={cardColor} onChange={e=>setCardColor(e.target.value)} style={{ width:36,height:28,border:"none",borderRadius:6,cursor:"pointer",background:"transparent" }}/>
                <span style={{ fontSize:"0.72rem",color:"#475569",fontFamily:"monospace" }}>{cardColor}</span>
                <button onClick={()=>setCardColor("#13131f")} style={{ marginLeft:"auto",fontSize:"0.68rem",padding:"3px 8px",borderRadius:6,background:"#1e293b",border:"none",color:"#64748b",cursor:"pointer" }}>Sıfırla</button>
              </div>
            </div>
          )}
          {showSyncPanel&&(
            <div style={{ marginTop:"0.75rem",background:"var(--card-color)",border:"1px solid #334155",borderRadius:12,padding:"1rem",fontSize:"0.78rem" }}>
              {syncCode?(
                <div style={{ display:"flex",flexDirection:"column",gap:"0.5rem" }}>
                  <div style={{ color:"#64748b" }}>Bağlı Sync Kodu:</div>
                  <div style={{ display:"flex",alignItems:"center",gap:"0.5rem" }}>
                    <span style={{ fontFamily:"monospace",fontSize:"1.1rem",color:"#818cf8",letterSpacing:"0.15em",fontWeight:"bold" }}>{syncCode}</span>
                    <button onClick={()=>{try{navigator.clipboard.writeText(syncCode);}catch(_){}}} style={{ background:"#1e293b",border:"none",borderRadius:6,padding:"3px 8px",color:"#94a3b8",cursor:"pointer",fontSize:"0.7rem" }}>Kopyala</button>
                  </div>
                  <div style={{ color:"#475569",fontSize:"0.7rem" }}>Bu kodu diğer cihazında girerek verilerini senkronize edebilirsin.</div>
                  <div style={{ display:"flex",gap:"0.4rem",alignItems:"center" }}>
                    <span style={{ fontSize:"0.7rem",color:syncStatus==="synced"?"#22c55e":syncStatus==="syncing"?"#f59e0b":"#ef4444" }}>
                      {syncStatus==="synced"?"✓ Senkronize":syncStatus==="syncing"?"⏳ Bağlanıyor...":"⚠ Bağlantı hatası"}
                    </span>
                  </div>
                  <button onClick={disconnectSync} style={{ background:"transparent",border:"1px solid #334155",borderRadius:6,padding:"4px 10px",color:"#64748b",cursor:"pointer",fontSize:"0.72rem",alignSelf:"flex-start" }}>Bağlantıyı Kes</button>
                </div>
              ):(
                <div style={{ display:"flex",flexDirection:"column",gap:"0.6rem" }}>
                  <div style={{ color:"#94a3b8" }}>Cihazlar arası otomatik senkronizasyon</div>
                  <div style={{ display:"flex",gap:"0.4rem" }}>
                    <button onClick={()=>{ const c=generateCode(); setSyncInput(c); }} style={{ background:"#1e293b",border:"none",borderRadius:6,padding:"5px 10px",color:"#818cf8",cursor:"pointer",fontSize:"0.72rem" }}>Yeni Kod Oluştur</button>
                  </div>
                  <div style={{ display:"flex",gap:"0.4rem",alignItems:"center" }}>
                    <input value={syncInput} onChange={e=>setSyncInput(e.target.value)} placeholder="Sync kodu gir..." style={{ flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"5px 8px",color:"#e2e8f0",fontSize:"0.78rem",outline:"none",fontFamily:"monospace" }}/>
                    <button onClick={()=>connectSync(syncInput)} style={{ background:"#818cf8",border:"none",borderRadius:6,padding:"5px 12px",color:"#0d0d14",cursor:"pointer",fontSize:"0.78rem",fontWeight:"bold" }}>Bağlan</button>
                  </div>
                  <div style={{ color:"#475569",fontSize:"0.7rem" }}>Yeni kod oluşturup diğer cihazında aynı kodu girerek senkronize edebilirsin.</div>
                </div>
              )}
            </div>
          )}
          {tasks.length>0&&(
            <div style={{ marginTop:"1rem" }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem" }}>
                <div style={{ display:"flex",gap:"0.75rem" }}>
                  <span style={{ fontSize:"0.72rem",color:"#22c55e" }}>{"✓ "+completed+" tamamlandı"}</span>
                  {inProgress>0&&<span style={{ fontSize:"0.72rem",color:"#f59e0b" }}>{"● "+inProgress+" devam ediyor"}</span>}
                  <span style={{ fontSize:"0.72rem",color:"#475569" }}>{(tasks.length-completed-inProgress)+" bekliyor"}</span>
                </div>
                <span style={{ fontSize:"0.72rem",color:"#64748b" }}>{progress+"%"}</span>
              </div>
              <div style={{ height:3,background:"#1e293b",borderRadius:99,position:"relative",overflow:"hidden" }}>
                <div style={{ position:"absolute",left:0,top:0,height:"100%",borderRadius:99,width:Math.round(((completed+inProgress)/tasks.length)*100)+"%",background:"#f59e0b22",transition:"width 0.5s ease" }}/>
                <div style={{ position:"absolute",left:0,top:0,height:"100%",borderRadius:99,width:progress+"%",background:"linear-gradient(90deg,#22c55e,#86efac)",transition:"width 0.5s ease" }}/>
              </div>
            </div>
          )}
          <div style={{ display:"flex",gap:"0.4rem",marginTop:"1rem",flexWrap:"wrap" }}>
            {[{id:"liste",label:"Liste"},{id:"haftalik",label:"Haftalık"},{id:"aylik",label:"Aylık"},{id:"kapatilan",label:"Kapatılan"+(closedTasks.length>0?" ("+closedTasks.length+")":"")}].map(v=>(
              <button key={v.id} onClick={()=>setView(v.id)} style={{ fontSize:"0.72rem",padding:"4px 12px",borderRadius:99,border:"none",cursor:"pointer",background:view===v.id?(v.id==="kapatilan"?"#475569":"#818cf8"):"#1e293b",color:view===v.id?"#f1f5f9":"#94a3b8",fontWeight:view===v.id?"bold":"normal",transition:"all 0.2s" }}>
                {v.label}
              </button>
            ))}
          </div>
        </div>

        {view==="haftalik"&&<WeeklyCalendar tasks={tasks} onCloseTask={closeTask}/>}
        {view==="aylik"&&<MonthlyCalendar tasks={tasks} onCloseTask={closeTask}/>}

        {/* Kapatılan */}
        {view==="kapatilan"&&(
          <div>
            {closedTasks.length===0?(
              <div style={{ textAlign:"center",color:"#475569",fontSize:"0.85rem",padding:"3rem 0" }}>Henüz kapatılan görev yok</div>
            ):(
              <div style={{ display:"flex",flexDirection:"column",gap:"0.6rem" }}>
                {closedTasks.map(task=>(
                  <div key={task.id} style={{ background:cardColor,border:"1px solid #1e293b",borderRadius:14,padding:"1rem 1.2rem",opacity:0.7 }}>
                    <div style={{ display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"0.5rem" }}>
                      <div style={{ flex:1,minWidth:0 }}>
                        <div style={{ fontSize:"0.92rem",color:"#64748b",textDecoration:"line-through",marginBottom:"0.2rem" }}>{task.emoji+" "+task.title}</div>
                        {task.detail&&<div style={{ fontSize:"0.75rem",color:"#334155" }}>{task.detail}</div>}
                        <div style={{ fontSize:"0.65rem",color:"#334155",marginTop:"0.3rem" }}>{"Kapatıldı: "+new Date(task.closedAt).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})}</div>
                      </div>
                      <div style={{ display:"flex",gap:"0.4rem",flexShrink:0 }}>
                        <button onClick={()=>restoreTask(task.id)} style={{ background:"#1e293b",border:"none",borderRadius:6,padding:"4px 10px",color:"#818cf8",cursor:"pointer",fontSize:"0.72rem" }}>↩ Geri Al</button>
                        <button onClick={()=>deleteClosedTask(task.id)} style={{ background:"transparent",border:"none",color:"#334155",cursor:"pointer",fontSize:"0.8rem",padding:"0 2px" }}
                          onMouseEnter={e=>e.target.style.color="#ef4444"} onMouseLeave={e=>e.target.style.color="#334155"}>🗑</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Liste */}
        {view==="liste"&&(
          <div>
            {weekTasks.length===0&&!addingTask&&(
              <div style={{ textAlign:"center",color:"#475569",fontSize:"0.85rem",padding:"3rem 0" }}>Bu hafta için görev yok. Aşağıdan yeni görev ekle.</div>
            )}
            {weekCategories.map(cat=>(
              <div key={cat} style={{ marginBottom:"1.5rem" }}>
                <div style={{ fontSize:"0.68rem",letterSpacing:"0.15em",color:"#475569",textTransform:"uppercase",marginBottom:"0.5rem",paddingLeft:"0.2rem" }}>{cat}</div>
                <div style={{ display:"flex",flexDirection:"column",gap:"0.6rem" }}>
                  {weekTasks.filter(t=>t.category===cat).sort((a,b)=>({yuksek:0,orta:1,dusuk:2}[a.priority]??1)-({yuksek:0,orta:1,dusuk:2}[b.priority]??1)).map(task=>{
                    const st=statusConfig[task.status];
                    const doneSubtasks=task.subtasks.filter(s=>s.done).length;
                    const isExpanded=expanded[task.id];
                    const recCol=recurrenceColor[task.recurrence]||"#64748b";
                    const elapsed=formatElapsed(task.startedAt);
                    const isOverdue=task.overdue&&task.status!=="tamamlandi";
                    const isPostponed=task.postponedUntil&&task.postponedUntil>localDateStr();
                    return (
                      <div key={task.id} style={{ background:cardColor,border:"1px solid "+(isOverdue?"#ef444433":"#1e293b"),borderRadius:14,padding:"1.1rem 1.2rem",opacity:task.status==="tamamlandi"?0.6:1,transition:"opacity 0.3s" }}>
                        <div style={{ display:"flex",alignItems:"flex-start",gap:"0.75rem" }}>
                          <div style={{ paddingTop:2 }}>
                            <CheckCircle status={task.status} onClick={()=>cycleStatus(task.id)}/>
                          </div>
                          <div style={{ flex:1,minWidth:0 }}>
                            {editingTitle===task.id?(
                              <div style={{ display:"flex",gap:"0.4rem",alignItems:"center",marginBottom:"0.2rem" }}>
                                <input autoFocus value={titleInput} onChange={e=>setTitleInput(e.target.value)}
                                  onKeyDown={e=>{if(e.key==="Enter")saveTitle(task.id);if(e.key==="Escape")setEditingTitle(null);}}
                                  style={{ flex:1,background:"#1e293b",border:"1px solid #475569",borderRadius:6,padding:"4px 8px",color:"#f1f5f9",fontSize:"0.95rem",fontWeight:"bold",outline:"none" }}/>
                                <button onClick={()=>saveTitle(task.id)} style={{ background:"#22c55e",border:"none",borderRadius:6,padding:"3px 8px",color:"#0d0d14",cursor:"pointer",fontSize:"0.72rem",fontWeight:"bold" }}>Kaydet</button>
                                <button onClick={()=>setEditingTitle(null)} style={{ background:"#1e293b",border:"none",borderRadius:6,padding:"3px 6px",color:"#94a3b8",cursor:"pointer",fontSize:"0.72rem" }}>İptal</button>
                              </div>
                            ):(
                              <div style={{ display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"0.4rem" }}>
                                <div onClick={()=>{setTitleInput(task.title);setEditingTitle(task.id);}} style={{ fontSize:"0.95rem",fontWeight:"bold",color:isOverdue?"#fca5a5":"#f1f5f9",textDecoration:task.status==="tamamlandi"?"line-through":"none",cursor:"text",flex:1 }}>
                                  {task.emoji+" "+task.title}
                                </div>
                                <div style={{ display:"flex",gap:"0.3rem",flexShrink:0 }}>
                                  {task.status!=="tamamlandi"&&(
                                    <button onClick={()=>handleOtele(task)} title="Ötele" style={{ background:"transparent",border:"none",color:"#475569",cursor:"pointer",fontSize:"0.72rem",padding:"0 3px",lineHeight:1 }}
                                      onMouseEnter={e=>e.target.style.color="#818cf8"} onMouseLeave={e=>e.target.style.color="#475569"}>
                                      ⏭
                                    </button>
                                  )}
                                  <button onClick={()=>closeTask(task.id)} title="Görevi kapat" style={{ background:"transparent",border:"none",color:"#334155",cursor:"pointer",fontSize:"0.8rem",padding:"0 2px",lineHeight:1 }}
                                    onMouseEnter={e=>e.target.style.color="#f59e0b"} onMouseLeave={e=>e.target.style.color="#334155"}>✕</button>
                                </div>
                              </div>
                            )}
                            {editingDetail===task.id?(
                              <div style={{ display:"flex",gap:"0.4rem",alignItems:"center",marginTop:"0.2rem" }}>
                                <input autoFocus value={detailInput} onChange={e=>setDetailInput(e.target.value)}
                                  onKeyDown={e=>{ if(e.key==="Enter"){setTasks(p=>p.map(t=>t.id===task.id?{...t,detail:detailInput}:t));setEditingDetail(null);} if(e.key==="Escape")setEditingDetail(null); }}
                                  style={{ flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"3px 8px",color:"#e2e8f0",fontSize:"0.75rem",outline:"none" }}/>
                                <button onClick={()=>{setTasks(p=>p.map(t=>t.id===task.id?{...t,detail:detailInput}:t));setEditingDetail(null);}} style={{ background:"#818cf8",border:"none",borderRadius:6,padding:"3px 8px",color:"#0d0d14",cursor:"pointer",fontSize:"0.72rem" }}>✓</button>
                                <button onClick={()=>setEditingDetail(null)} style={{ background:"transparent",border:"none",color:"#475569",cursor:"pointer",fontSize:"0.8rem" }}>✕</button>
                              </div>
                            ):(
                              <div onClick={()=>{setEditingDetail(task.id);setDetailInput(task.detail||"");}}
                                style={{ fontSize:"0.78rem",color:task.detail?"#64748b":"#334155",marginTop:"0.2rem",cursor:"pointer",minHeight:"1rem" }}>
                                {task.detail||<span style={{color:"#2d3748",fontSize:"0.72rem"}}>+ açıklama ekle</span>}
                              </div>
                            )}

                            {task.subtasks.length>0&&(()=>{
                              const pct=Math.round((doneSubtasks/task.subtasks.length)*100);
                              return(
                                <div style={{ marginTop:"0.5rem" }}>
                                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:"0.2rem" }}>
                                    <span style={{ fontSize:"0.62rem",color:"#475569" }}>{doneSubtasks+"/"+task.subtasks.length+" alt görev"}</span>
                                    <span style={{ fontSize:"0.62rem",color:"#475569" }}>{pct+"%"}</span>
                                  </div>
                                  <div style={{ height:3,background:"#1e293b",borderRadius:99,overflow:"hidden" }}>
                                    <div style={{ height:"100%",borderRadius:99,width:pct+"%",background:pct===100?"linear-gradient(90deg,#22c55e,#86efac)":"linear-gradient(90deg,#818cf8,#a5b4fc)",transition:"width 0.4s ease" }}/>
                                  </div>
                                </div>
                              );
                            })()}

                            {/* Rozetler */}
                            <div style={{ display:"flex",gap:"0.4rem",marginTop:"0.5rem",flexWrap:"wrap",alignItems:"center" }}>
                              {isOverdue&&<span style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,background:"rgba(239,68,68,0.15)",color:"#ef4444",fontWeight:"bold" }}>⚠ Gecikmiş</span>}
                              {isPostponed&&<span style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,background:"rgba(129,140,248,0.12)",color:"#818cf8" }}>{"⏭ "+task.postponedUntil+" ertelendi"}</span>}
                              {!isOverdue&&<span style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,background:st.bg,color:st.color }}>{st.label}</span>}
                              <button onClick={()=>setEditingTime(editingTime===task.id?null:task.id)} style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,background:"rgba(255,255,255,0.04)",color:"#94a3b8",border:"none",cursor:"pointer" }}>
                                {"⏰ "+formatTimeLabel(task.time)}
                              </button>
                              <PriorityDropdown priority={task.priority} onChange={p=>updateTask(task.id,{priority:p})}/>
                              <button onClick={()=>setEditingRecurrence(editingRecurrence===task.id?null:task.id)} style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,background:recCol+"18",color:recCol,border:"1px solid "+recCol+"44",cursor:"pointer" }}>
                                {"🔁 "+formatRecurrenceLabel(task)}
                              </button>
                              <button onClick={()=>setEditingCategory(editingCategory===task.id?null:task.id)} style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,background:"rgba(255,255,255,0.04)",color:"#64748b",border:"none",cursor:"pointer" }}>
                                {"🏷 "+task.category}
                              </button>
                              {task.status==="devamediyor"&&elapsed&&(
                                <span style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,background:"rgba(245,158,11,0.12)",color:"#f59e0b" }}>{"⏱ "+elapsed}</span>
                              )}
                              {task.subtasks.length>0&&(
                                <button onClick={()=>setExpanded(e=>({...e,[task.id]:!e[task.id]}))} style={{ fontSize:"0.68rem",padding:"2px 8px",borderRadius:99,background:"rgba(255,255,255,0.06)",color:"#94a3b8",border:"none",cursor:"pointer" }}>
                                  {(isExpanded?"▲ ":"▼ ")+doneSubtasks+"/"+task.subtasks.length+" alt görev"}
                                </button>
                              )}
                            </div>

                            {editingTime===task.id&&<TimeEditor value={task.time} onChange={val=>updateTask(task.id,{time:val})} onClose={()=>setEditingTime(null)}/>}
                            {editingRecurrence===task.id&&<RecurrenceEditor task={task} onChange={changes=>handleRecurrenceChange(task.id,changes)} onClose={()=>setEditingRecurrence(null)}/>}
                            {editingCategory===task.id&&<CategoryEditor task={task} allCategories={allCategories} onSelect={cat=>updateTask(task.id,{category:cat})} onAddCategory={cat=>setCustomCategories(prev=>[...new Set([...prev,cat])])} onClose={()=>setEditingCategory(null)}/>}

                            {/* Alt görevler */}
                            {isExpanded&&task.subtasks.length>0&&(
                              <div style={{ marginTop:"0.75rem",borderLeft:"2px solid #1e293b",paddingLeft:"0.9rem",display:"flex",flexDirection:"column",gap:"0.4rem" }}>
                                {task.subtasks.map(sub=>(
                                  <div key={sub.id} style={{ display:"flex",alignItems:"center",gap:"0.5rem" }}>
                                    <button onClick={()=>toggleSubtask(task.id,sub.id)} style={{ width:17,height:17,borderRadius:"50%",border:"2px solid "+(sub.done?"#22c55e":"#334155"),background:sub.done?"#22c55e":"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",padding:0 }}>
                                      {sub.done&&<svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#0d0d14" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                                    </button>
                                    <span style={{ fontSize:"0.82rem",color:sub.done?"#475569":"#cbd5e1",textDecoration:sub.done?"line-through":"none",flex:1 }}>{sub.label}</span>
                                    <button onClick={()=>removeSubtask(task.id,sub.id)} style={{ background:"transparent",border:"none",color:"#334155",cursor:"pointer",fontSize:"0.72rem",padding:"0 4px" }}>x</button>
                                  </div>
                                ))}
                              </div>
                            )}

                            {addingSubtask===task.id?(
                              <div style={{ marginTop:"0.6rem",display:"flex",gap:"0.4rem" }}>
                                <input autoFocus value={newSubtask[task.id]||""} onChange={e=>setNewSubtask(n=>({...n,[task.id]:e.target.value}))}
                                  onKeyDown={e=>{if(e.key==="Enter")addSubtask(task.id);if(e.key==="Escape")setAddingSubtask(null);}}
                                  placeholder="Alt görev adı..."
                                  style={{ flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"4px 8px",color:"#e2e8f0",fontSize:"0.78rem",outline:"none" }}/>
                                <button onClick={()=>addSubtask(task.id)} style={{ background:"#22c55e",border:"none",borderRadius:6,padding:"4px 10px",color:"#0d0d14",cursor:"pointer",fontSize:"0.75rem",fontWeight:"bold" }}>Ekle</button>
                                <button onClick={()=>setAddingSubtask(null)} style={{ background:"#1e293b",border:"none",borderRadius:6,padding:"4px 8px",color:"#94a3b8",cursor:"pointer",fontSize:"0.75rem" }}>İptal</button>
                              </div>
                            ):(
                              <button onClick={()=>{setAddingSubtask(task.id);setExpanded(e=>({...e,[task.id]:true}));}} style={{ marginTop:"0.5rem",background:"transparent",border:"none",color:"#334155",cursor:"pointer",fontSize:"0.72rem",padding:0,display:"block" }}>+ alt görev ekle</button>
                            )}

                            {editingNote===task.id?(
                              <div style={{ marginTop:"0.5rem",display:"flex",gap:"0.4rem" }}>
                                <input autoFocus value={noteInput} onChange={e=>setNoteInput(e.target.value)}
                                  onKeyDown={e=>{if(e.key==="Enter")saveNote(task.id);if(e.key==="Escape")setEditingNote(null);}}
                                  placeholder="Not ekle..."
                                  style={{ flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"4px 8px",color:"#e2e8f0",fontSize:"0.78rem",outline:"none" }}/>
                                <button onClick={()=>saveNote(task.id)} style={{ background:"#22c55e",border:"none",borderRadius:6,padding:"4px 10px",color:"#0d0d14",cursor:"pointer",fontSize:"0.75rem",fontWeight:"bold" }}>Kaydet</button>
                                <button onClick={()=>setEditingNote(null)} style={{ background:"#1e293b",border:"none",borderRadius:6,padding:"4px 8px",color:"#94a3b8",cursor:"pointer",fontSize:"0.75rem" }}>İptal</button>
                              </div>
                            ):task.note?(
                              <div style={{ marginTop:"0.5rem",fontSize:"0.78rem",color:"#94a3b8",fontStyle:"italic",cursor:"pointer" }} onClick={()=>{setNoteInput(task.note);setEditingNote(task.id);}}>{"📝 "+task.note}</div>
                            ):(
                              <button onClick={()=>{setNoteInput("");setEditingNote(task.id);}} style={{ marginTop:"0.3rem",background:"transparent",border:"none",color:"#334155",cursor:"pointer",fontSize:"0.72rem",padding:0,display:"block" }}>+ not ekle</button>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}

            {addingTask?(
              <div style={{ background:cardColor,border:"1px solid #334155",borderRadius:14,padding:"1.1rem 1.2rem",marginBottom:"1rem" }}>
                <div style={{ fontSize:"0.72rem",color:"#64748b",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"0.75rem" }}>Yeni Görev</div>
                <div style={{ display:"flex",flexDirection:"column",gap:"0.5rem" }}>
                  <div style={{ display:"flex",gap:"0.4rem" }}>
                    <input value={newTask.emoji} onChange={e=>setNewTask(n=>({...n,emoji:e.target.value}))} style={{ width:44,background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"6px 8px",color:"#e2e8f0",fontSize:"1rem",outline:"none",textAlign:"center" }}/>
                    <input autoFocus value={newTask.title} onChange={e=>setNewTask(n=>({...n,title:e.target.value}))}
                      onKeyDown={e=>{if(e.key==="Enter")addTask();if(e.key==="Escape")setAddingTask(false);}}
                      placeholder="Görev başlığı..."
                      style={{ flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"6px 10px",color:"#e2e8f0",fontSize:"0.88rem",outline:"none" }}/>
                  </div>
                  <input value={newTask.detail} onChange={e=>setNewTask(n=>({...n,detail:e.target.value}))}
                    placeholder="Açıklama (isteğe bağlı)..."
                    style={{ background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"6px 10px",color:"#e2e8f0",fontSize:"0.78rem",outline:"none" }}/>
                  <div style={{ display:"flex",gap:"0.4rem",flexWrap:"wrap",alignItems:"center" }}>
                    <span style={{ fontSize:"0.7rem",color:"#64748b" }}>Kategori:</span>
                    {allCategories.map(cat=>(
                      <button key={cat} onClick={()=>setNewTask(n=>({...n,category:cat}))} style={{ fontSize:"0.68rem",padding:"2px 10px",borderRadius:99,border:"none",cursor:"pointer",background:newTask.category===cat?"#818cf8":"#1e293b",color:newTask.category===cat?"#0d0d14":"#94a3b8",fontWeight:newTask.category===cat?"bold":"normal" }}>{cat}</button>
                    ))}
                  </div>
                  <div style={{ display:"flex",gap:"0.4rem",flexWrap:"wrap",alignItems:"center" }}>
                    <span style={{ fontSize:"0.7rem",color:"#64748b" }}>Öncelik:</span>
                    {PRIORITIES.map(p=>(
                      <button key={p} onClick={()=>setNewTask(n=>({...n,priority:p}))} style={{ fontSize:"0.68rem",padding:"2px 10px",borderRadius:99,border:"none",cursor:"pointer",background:newTask.priority===p?priorityColor[p]:"#1e293b",color:newTask.priority===p?"#0d0d14":"#94a3b8",fontWeight:newTask.priority===p?"bold":"normal" }}>{priorityLabel[p]}</button>
                    ))}
                  </div>
                  <div style={{ display:"flex",gap:"0.4rem",flexWrap:"wrap",alignItems:"center" }}>
                    <span style={{ fontSize:"0.7rem",color:"#64748b" }}>Zaman:</span>
                    {["bugun","yarin"].map(t=>(
                      <button key={t} onClick={()=>setNewTask(n=>({...n,time:t}))} style={{ fontSize:"0.68rem",padding:"2px 10px",borderRadius:99,border:"none",cursor:"pointer",background:newTask.time===t?"#818cf8":"#1e293b",color:newTask.time===t?"#0d0d14":"#94a3b8",fontWeight:newTask.time===t?"bold":"normal" }}>{t==="bugun"?"Bugün":"Yarın"}</button>
                    ))}
                  </div>
                  <div style={{ display:"flex",gap:"0.4rem",marginTop:"0.25rem" }}>
                    <button onClick={addTask} style={{ background:"#22c55e",border:"none",borderRadius:6,padding:"6px 14px",color:"#0d0d14",cursor:"pointer",fontSize:"0.8rem",fontWeight:"bold" }}>Ekle</button>
                    <button onClick={()=>setAddingTask(false)} style={{ background:"#1e293b",border:"none",borderRadius:6,padding:"6px 12px",color:"#94a3b8",cursor:"pointer",fontSize:"0.8rem" }}>İptal</button>
                  </div>
                </div>
              </div>
            ):(
              <button onClick={()=>setAddingTask(true)} style={{ width:"100%",background:"transparent",border:"1px dashed #1e293b",borderRadius:14,padding:"0.8rem",color:"#334155",cursor:"pointer",fontSize:"0.8rem",marginBottom:"1rem" }}>
                + yeni görev ekle
              </button>
            )}
          </div>
        )}

        {/* Dışa/İçe Aktar */}
        <div style={{ marginTop:"1rem",display:"flex",gap:"0.5rem",justifyContent:"center" }}>
          <button onClick={()=>{
            const data=JSON.stringify({tasks,customCategories,closedTasks},null,2);
            const blob=new Blob([data],{type:"application/json"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url; a.download="gorevler-yedek.json"; a.click();
            URL.revokeObjectURL(url);
          }} style={{ fontSize:"0.75rem",padding:"6px 16px",borderRadius:8,background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",cursor:"pointer" }}>
            ⬇ Dışa Aktar
          </button>
          <label style={{ fontSize:"0.75rem",padding:"6px 16px",borderRadius:8,background:"#1e293b",color:"#94a3b8",border:"1px solid #334155",cursor:"pointer" }}>
            ⬆ İçe Aktar
            <input type="file" accept=".json" style={{ display:"none" }} onChange={e=>{
              const file=e.target.files[0]; if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>{
                try{
                  const parsed=JSON.parse(ev.target.result);
                  const it=Array.isArray(parsed)?parsed:(parsed.tasks||[]);
                  const ic=Array.isArray(parsed)?[]:(parsed.customCategories||[]);
                  const il=Array.isArray(parsed)?[]:(parsed.closedTasks||[]);
                  if(it.length>0||il.length>0){setTasks(it);setCustomCategories(ic);setClosedTasks(il);alert("Veriler başarıyla içe aktarıldı! ✅");}
                  else alert("Geçersiz dosya!");
                }catch(_){alert("Dosya okunamadı!");}
              };
              reader.readAsText(file); e.target.value="";
            }}/>
          </label>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(Yapilacaklar));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
self.addEventListener('install', e => e.waitUntil(caches.open('gorevler-v1').then(c => c.addAll(['/']))));
self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))); });
`;
      const blob = new Blob([swCode],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
  </script>
</body>
</html>
